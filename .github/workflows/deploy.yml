name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: 100.108.101.109
          username: fry
          password: ${{ secrets.ZEUS00_SSH_PASSWORD }}
          script: |
            cd /home/fry/azimuth-web
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            echo "Deploy complete: $(docker ps --filter name=azimuth-web --format '{{.Status}}')"
