services:
  worker-adsb:
    build: { context: ., dockerfile: Dockerfile.workers }
    command: node dist/workers/ingest-adsb.js
    restart: unless-stopped
    env_file: /home/fry/.env.workers
    network_mode: host

  worker-ais:
    build: { context: ., dockerfile: Dockerfile.workers }
    command: node dist/workers/ingest-ais.js
    restart: unless-stopped
